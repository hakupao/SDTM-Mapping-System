<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1280" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF7F6"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F9FF"/>
    </linearGradient>
    <filter id="soft" x="-40" y="-40" width="1360" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="780" rx="32" fill="url(#bg2)"/>
  <text x="60" y="86" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Repository Preview</text>
  <text x="60" y="126" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="22">A public-facing snapshot of the engine, its control plane, and its output contract.</text>

  <g filter="url(#soft)">
    <rect x="60" y="170" width="355" height="548" rx="28" fill="url(#blueCard)" stroke="#BFDBFE"/>
    <rect x="462" y="170" width="355" height="548" rx="28" fill="url(#blueCard)" stroke="#A7F3D0"/>
    <rect x="864" y="170" width="356" height="548" rx="28" fill="url(#blueCard)" stroke="#DDD6FE"/>
  </g>

  <text x="92" y="220" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">INPUT + CONFIG</text>
  <text x="92" y="256" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Study binding</text>
  <text x="92" y="292" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Project settings and workbook sheets define how a study is interpreted.</text>

  <rect x="92" y="326" width="291" height="110" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="116" y="360" fill="#1E40AF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">project.local.json</text>
  <text x="116" y="388" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">STUDY_ID, ROOT_PATH, RAW_DATA_ROOT_PATH,</text>
  <text x="116" y="412" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">CODELIST/METADATA/TRANSDATA names</text>

  <rect x="92" y="458" width="291" height="200" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="116" y="492" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Operation workbook</text>
  <text x="116" y="524" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">SheetSetting</text>
  <text x="116" y="552" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">Patients / Files / Process</text>
  <text x="116" y="580" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">CodeList / Mapping / DomainsSetting</text>
  <text x="116" y="608" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">Optional Refactoring / Combine hooks</text>

  <text x="494" y="220" fill="#059669" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">EXECUTION ENGINE</text>
  <text x="494" y="256" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Stage pipeline</text>
  <text x="494" y="292" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">The core remains stable while study rules change through configuration.</text>

  <rect x="494" y="326" width="291" height="66" rx="18" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="520" y="366" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">VC_OP01 Cleaning</text>

  <rect x="494" y="408" width="291" height="66" rx="18" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="520" y="448" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">VC_OP02 / VC_OP03 DB prep</text>

  <rect x="494" y="490" width="291" height="66" rx="18" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="520" y="530" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">VC_OP04 Format</text>

  <rect x="494" y="572" width="291" height="66" rx="18" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="520" y="612" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">VC_OP05 Mapping</text>

  <text x="494" y="676" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Vectorized mapping, CSV cache, temp-table options,</text>
  <text x="494" y="702" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">parallel domain processing, and fail-fast validation.</text>

  <text x="896" y="220" fill="#7C3AED" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">DELIVERABLES</text>
  <text x="896" y="256" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Artifacts you can inspect</text>
  <text x="896" y="292" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">The repository already includes a generated ENSEMBLE snapshot.</text>

  <rect x="896" y="326" width="292" height="124" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="920" y="360" fill="#5B21B6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">04_SDTM</text>
  <text x="920" y="390" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">DM, CM, DS, MI, PR, RS, SS, TU</text>
  <text x="920" y="416" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">timestamped domain output folders</text>

  <rect x="896" y="470" width="292" height="104" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="920" y="504" fill="#5B21B6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">05_Inputfile</text>
  <text x="920" y="534" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">Main SDTM CSVs plus SUPP datasets</text>

  <rect x="896" y="594" width="292" height="88" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="920" y="628" fill="#5B21B6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">06_Inputpackage</text>
  <text x="920" y="658" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16">JSON hierarchy and final m5.zip</text>
</svg>
